<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid-flow-player@latest/mermaid-flow-player.element.js"></script>
</head>
<body>
  <mermaid-flow-player controls>
flowchart LR
A[Build] --> B[Test]
B --> C[Deploy]
  </mermaid-flow-player>
  <div id="result"></div>
  <script>
    setTimeout(() => {
      const p = document.querySelector('mermaid-flow-player');
      document.getElementById('result').innerHTML = 
        'innerHTML: ' + p.innerHTML.substring(0,100) + 
        '<br>children: ' + p.children.length +
        '<br>mermaid: ' + typeof window.mermaid +
        '<br>mermaid.run: ' + typeof window.mermaid?.run;
    }, 2000);
  </script>
</body>
</html>
